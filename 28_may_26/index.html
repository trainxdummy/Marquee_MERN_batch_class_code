<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="card-container">
            <div class="image-div">
                <img 
                  
                    src="https://images.unsplash.com/photo-1595341888016-a392ef81b7de?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fHNob2VzfGVufDB8fDB8fHww" 
                    alt="Green Shoes image"
                    />

            </div>
            <span class="sale-badge">Sale</span>
            <span class="heart-badge">
                &hearts;
            </span>

            <div class="content">
                <h1>Running Shoes</h1>
                <span>Rs. 2999</span>
                <button class="btn">Add to Card</button>
            </div>
        </div>
    </div>
</body>
</html>
