<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="flipkart.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
    <div class="main-container">
        <div class="container">
            <div class="header">
                   <div class="navbar-container">
                        <div class="left-nav-content">
                            <div class="flipkart-btn"> 
                                <img src="https://rukminim2.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png" alt="flipkart logo">
                                Flipkart
                            </div>
                            <div class="travel-btn"> 
                                <img src="https://rukminim2.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png" alt="travel logo">
                                Travel
                            </div>
                        </div>
                        <div class="right-nav-content">
                            <p>
                                Location not set 
                            </p>
                            <span>
                                Select delivery option
                            </span>
                        </div>
                    </div>
                    <div class="searchbar-container">
                        <div class="searchbar-div">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="Search for Products, Brands & More">
                        </div>
                        <div class="right-searchbar-content">
                            <div>Login</div>
                            <div>More</div>
                            <div>Cart</div>
                        </div>
                    </div>
                    <hr/>
                    <div class="main-navbar">
                        <div>For you</div>
                        <div>Fashion</div>
                        <div>Mobiles</div>
                        <div>Beauty</div>
                        <div>Electronics</div>
                        <div>Home</div>
                        <div>Applicances</div>
                        <div>Food</div>
                        <div>Furniture</div>
                        <div>Toys</div>
                    </div>
            </div>
            <div class="page1">
                <div class="three-cards-div">
                    <div class="img-div">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/59f7293ef34201e4.png" alt="">
                    </div>
                    <div class="img-div">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/b952c206f10c2136.png" alt="">
                    </div>
                    <div class="img-div">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/b952c206f10c2136.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
