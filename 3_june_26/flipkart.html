<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="flipkart.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="main-container">
        <div class="container">
            <div class="header">
                    <div class="navbar-container">
                            <div class="left-nav-content">
                                <div class="flipkart-btn"> Flipkart</div>
                                <div class="travel-btn"> Travel</div>
                            </div>
                            <div class="right-nav-content">
                                <p>
                                    Location not set 
                                </p>
                                <span>
                                    Select delivery option
                                </span>
                            </div>
                    </div>
                    <div class="searchbar-container">
                        <div class="searchbar-div">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="Search for Products, Brands & More">
                        </div>
                        <div class="searchbar-right-content">
                            <div>Login</div>
                            <div>More</div>
                            <div>Cart</div>
                        </div>
                    </div>
                    <div class="main-navbar">
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-bag-shopping"></i>
                            For you
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-shirt"></i>
                            Fashion
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-mobile"></i>
                            Mobile
                        </div>
                        <div class="main-navbar-items">
                        <i class="fa-solid fa-shirt"></i>
                            Beauty
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-brands fa-apple"></i>
                            Electronics
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-house-chimney"></i>
                            Home
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-lightbulb"></i>
                            Applicances
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-book"></i>
                            Books
                        </div>
                        <div class="main-navbar-items">
                            <i class="fa-solid fa-couch"></i>
                            Furnitures
                        </div>
                    </div>
            </div>

            <div class="three-cards-container">
                <div class="cards">
                    <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/f2a125cd24b562d9.jpg" alt="">

                <div class="cards">
                    <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/052ab1594c9c31a3.jpg" alt="">

            </div>

            <div class="section3-container">
                <h1>Appliance for cool summer</h1>
               <div class="images-sec3">
